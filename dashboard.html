<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stefan's Dashboard">
<title>Stefan's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #181c26;
  --bg3: #1e2330;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f2f8;
  --muted: #7a82a0;
  --accent: #4f7cff;
  --accent2: #7c5fff;
  --danger: #ff5060;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow-x: hidden;
}

body {
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,124,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(124,95,255,0.10) 0%, transparent 60%);
  padding: 2.5rem 1.5rem 5rem;
}

header {
  max-width: 960px;
  margin: 0 auto 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 1rem;
}

.greeting {
  font-size: clamp(1.5rem, 4vw, 2.1rem);
  font-weight: 700;
  letter-spacing: -0.03em;
}

.greeting span {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.clock { text-align: right; line-height: 1.4; }
#time { font-size: 1.5rem; font-weight: 600; display: block; }
#date { font-size: 0.85rem; color: var(--muted); }

/* Section */
.section { max-width: 960px; margin: 0 auto 2rem; }

.section-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.8rem;
}

.section-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.add-section-btn {
  background: none;
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 6px;
  color: var(--muted);
  font-size: 0.68rem;
  font-family: inherit;
  padding: 2px 8px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.06em;
}
.add-section-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
  gap: 11px;
}

/* Tile */
.tile {
  position: relative;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.1rem 0.8rem 0.9rem;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  min-height: 104px;
  justify-content: center;
  animation: fadeUp 0.4s ease both;
}

.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.tile:hover { transform: translateY(-3px) scale(1.02); border-color: var(--border-hover); background: var(--bg3); }
.tile:active { transform: scale(0.97); }

.tile-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.tile-icon img {
  width: 30px;
  height: 30px;
  object-fit: contain;
}

.tile-icon .fallback-letter {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
}

.tile-name {
  font-size: 0.76rem;
  font-weight: 500;
  text-align: center;
  color: var(--text);
  line-height: 1.25;
  word-break: break-word;
  max-width: 100%;
}

/* Delete button */
.tile-delete {
  display: none;
  position: absolute;
  top: 6px;
  right: 6px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--danger);
  border: none;
  color: #fff;
  font-size: 0.8rem;
  line-height: 1;
  cursor: pointer;
  align-items: center;
  justify-content: center;
  z-index: 2;
  padding: 0;
}

body.edit-mode .tile-delete { display: flex; }
body.edit-mode .tile { animation: wiggle 0.5s ease infinite alternate; }
body.edit-mode .tile:hover { transform: none; }

/* Add tile button */
.tile-add {
  background: transparent;
  border: 1.5px dashed rgba(255,255,255,0.15);
  border-radius: 16px;
  min-height: 104px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  cursor: pointer;
  color: var(--muted);
  font-size: 0.76rem;
  font-family: inherit;
  transition: all 0.18s;
}
.tile-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,124,255,0.05); }
.tile-add .plus-icon { font-size: 1.5rem; line-height: 1; }

/* Toolbar */
.toolbar {
  max-width: 960px;
  margin: 0 auto 1.5rem;
  display: flex;
  gap: 0.6rem;
  align-items: center;
}

.toolbar-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 0.78rem;
  font-family: inherit;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar-btn:hover { border-color: var(--border-hover); color: var(--text); }
.toolbar-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,124,255,0.08); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg3);
  border: 1px solid var(--border-hover);
  border-radius: 20px;
  padding: 1.8rem;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
}

.modal h2 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
}

.modal label {
  font-size: 0.78rem;
  color: var(--muted);
  display: block;
  margin-bottom: 0.35rem;
}

.modal input, .modal select {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  padding: 0.6rem 0.9rem;
  outline: none;
  transition: border-color 0.15s;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal input::placeholder { color: var(--muted); }

.modal select option { background: var(--bg3); }

.preview-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.preview-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.preview-icon img { width: 30px; height: 30px; object-fit: contain; }
.preview-name { font-size: 0.9rem; font-weight: 500; color: var(--text); }

.modal-btns { display: flex; gap: 0.7rem; }

.btn-primary {
  flex: 1;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 0.88rem;
  font-weight: 600;
  font-family: inherit;
  padding: 0.65rem;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }

.btn-secondary {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 0.88rem;
  font-family: inherit;
  padding: 0.65rem 1rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--border-hover); color: var(--text); }

/* New Section Modal */
.section-add-area {
  max-width: 960px;
  margin: 1rem auto 0;
}

.add-section-main-btn {
  background: transparent;
  border: 1.5px dashed rgba(255,255,255,0.12);
  border-radius: 12px;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.82rem;
  padding: 0.65rem 1.2rem;
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.add-section-main-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Install bar */
#install-bar {
  display: none;
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--border-hover);
  border-radius: 14px;
  padding: 0.75rem 1.2rem;
  font-size: 0.83rem;
  color: var(--text);
  gap: 0.8rem;
  align-items: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  z-index: 100;
  white-space: nowrap;
}
#install-bar.visible { display: flex; }
#install-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0.35rem 0.9rem; font-size: 0.8rem; font-weight: 600; font-family: inherit; cursor: pointer; }
#dismiss-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes wiggle {
  from { transform: rotate(-1.2deg) scale(1); }
  to   { transform: rotate(1.2deg) scale(1); }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="greeting">Guten Tag, <span>Stefan</span> 👋</div>
  </div>
  <div class="clock">
    <span id="time">--:--</span>
    <span id="date"></span>
  </div>
</header>

<div class="toolbar">
  <button class="toolbar-btn" id="edit-btn" onclick="toggleEditMode()">
    <span id="edit-icon">✏️</span> <span id="edit-label">Bearbeiten</span>
  </button>
</div>

<div id="sections-container"></div>

<div class="section-add-area">
  <button class="add-section-main-btn" onclick="openNewSectionModal()">
    <span>＋</span> Neue Kategorie
  </button>
</div>

<!-- Add Tile Modal -->
<div class="modal-overlay" id="tile-modal">
  <div class="modal">
    <h2>Neue Kachel</h2>
    <div>
      <label>Name</label>
      <input type="text" id="tile-name-input" placeholder="z.B. Spiegel Online" oninput="updatePreview()">
    </div>
    <div>
      <label>URL</label>
      <input type="text" id="tile-url-input" placeholder="z.B. spiegel.de" oninput="updatePreview()">
    </div>
    <div>
      <label>Kategorie</label>
      <select id="tile-section-select"></select>
    </div>
    <div class="preview-row">
      <div class="preview-icon" id="preview-icon-wrap">
        <span class="fallback-letter" id="preview-fallback">?</span>
      </div>
      <span class="preview-name" id="preview-name-label">Vorschau</span>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('tile-modal')">Abbrechen</button>
      <button class="btn-primary" onclick="addTile()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- New Section Modal -->
<div class="modal-overlay" id="section-modal">
  <div class="modal">
    <h2>Neue Kategorie</h2>
    <div>
      <label>Name der Kategorie</label>
      <input type="text" id="section-name-input" placeholder="z.B. Arbeit & Finanzen">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('section-modal')">Abbrechen</button>
      <button class="btn-primary" onclick="addSection()">Erstellen</button>
    </div>
  </div>
</div>

<div id="install-bar">
  <span>📲 Als App installieren?</span>
  <button id="install-btn">Installieren</button>
  <button id="dismiss-btn">✕</button>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const DEFAULT_DATA = {
  sections: [
    {
      id: 's1', name: 'Nachrichten & Medien',
      tiles: [
        { id: 't1', name: 'YouTube',     url: 'https://youtube.com' },
        { id: 't2', name: 'Welt',        url: 'https://welt.de' },
        { id: 't3', name: 'Nius',        url: 'https://nius.de' },
        { id: 't4', name: 'Epoch Times', url: 'https://epochtimes.de' },
        { id: 't5', name: 'Kicker',      url: 'https://kicker.de' },
      ]
    },
    {
      id: 's2', name: 'KI & Tools',
      tiles: [
        { id: 't6', name: 'Gemini', url: 'https://gemini.google.com' },
        { id: 't7', name: 'Grok',   url: 'https://grok.com' },
        { id: 't8', name: 'Amazon', url: 'https://amazon.de' },
      ]
    },
    {
      id: 's3', name: 'Google',
      tiles: [
        { id: 't9',  name: 'Gmail',    url: 'https://gmail.com' },
        { id: 't10', name: 'Kalender', url: 'https://calendar.google.com' },
      ]
    },
    {
      id: 's4', name: 'Glaube',
      tiles: [
        { id: 't11', name: 'Calvary Chapel Siegen',  url: 'https://ccs-siegen.de' },
        { id: 't12', name: 'Grundlagen des Glaubens', url: 'https://www.ebtc.org/grundlagen-des-glaubens' },
      ]
    }
  ]
};

function loadData() {
  try {
    const raw = localStorage.getItem('dashboard_data');
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData() {
  localStorage.setItem('dashboard_data', JSON.stringify(appData));
}

let appData = loadData();
let editMode = false;
let addingToSection = null;

// ── Favicon helpers ───────────────────────────────────────────────────
function normalizeUrl(raw) {
  raw = raw.trim();
  if (!raw) return '';
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  return raw;
}

function getFaviconUrl(url) {
  try {
    const u = new URL(normalizeUrl(url));
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch(e) { return ''; }
}

function getInitial(name) {
  return (name || '?').trim()[0].toUpperCase();
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  appData.sections.forEach((sec, sIdx) => {
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.dataset.sectionId = sec.id;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    const lbl = document.createElement('span');
    lbl.className = 'section-label';
    lbl.textContent = sec.name;
    hdr.appendChild(lbl);

    if (editMode) {
      const delSecBtn = document.createElement('button');
      delSecBtn.className = 'add-section-btn';
      delSecBtn.style.borderColor = 'rgba(255,80,96,0.4)';
      delSecBtn.style.color = '#ff5060';
      delSecBtn.textContent = '✕ Kategorie löschen';
      delSecBtn.onclick = () => deleteSection(sec.id);
      hdr.appendChild(delSecBtn);
    }

    secEl.appendChild(hdr);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'grid';

    sec.tiles.forEach((tile, tIdx) => {
      const a = document.createElement('a');
      a.className = 'tile';
      a.href = normalizeUrl(tile.url);
      a.target = '_blank';
      a.rel = 'noopener';
      a.style.animationDelay = (tIdx * 0.04) + 's';

      // Delete btn
      const delBtn = document.createElement('button');
      delBtn.className = 'tile-delete';
      delBtn.textContent = '✕';
      delBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); deleteTile(sec.id, tile.id); };
      a.appendChild(delBtn);

      // Icon
      const iconWrap = document.createElement('div');
      iconWrap.className = 'tile-icon';
      const faviconUrl = getFaviconUrl(tile.url);
      if (faviconUrl) {
        const img = document.createElement('img');
        img.src = faviconUrl;
        img.alt = tile.name;
        img.onerror = () => {
          img.remove();
          const span = document.createElement('span');
          span.className = 'fallback-letter';
          span.textContent = getInitial(tile.name);
          iconWrap.appendChild(span);
        };
        iconWrap.appendChild(img);
      } else {
        const span = document.createElement('span');
        span.className = 'fallback-letter';
        span.textContent = getInitial(tile.name);
        iconWrap.appendChild(span);
      }
      a.appendChild(iconWrap);

      // Name
      const name = document.createElement('span');
      name.className = 'tile-name';
      name.textContent = tile.name;
      a.appendChild(name);

      // Prevent navigation in edit mode
      a.addEventListener('click', (e) => {
        if (editMode) e.preventDefault();
      });

      grid.appendChild(a);
    });

    // Add tile button
    const addBtn = document.createElement('button');
    addBtn.className = 'tile-add';
    addBtn.innerHTML = '<span class="plus-icon">＋</span><span style="font-size:0.73rem">Hinzufügen</span>';
    addBtn.onclick = () => openTileModal(sec.id);
    grid.appendChild(addBtn);

    secEl.appendChild(grid);
    container.appendChild(secEl);
  });

  // Populate section select in modal
  const sel = document.getElementById('tile-section-select');
  sel.innerHTML = '';
  appData.sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

// ── Edit mode ─────────────────────────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('edit-label').textContent = editMode ? 'Fertig' : 'Bearbeiten';
  document.getElementById('edit-icon').textContent  = editMode ? '✅' : '✏️';
  document.getElementById('edit-btn').classList.toggle('active', editMode);
  render();
}

// ── Tile CRUD ─────────────────────────────────────────────────────────
function openTileModal(sectionId) {
  addingToSection = sectionId;
  document.getElementById('tile-name-input').value = '';
  document.getElementById('tile-url-input').value  = '';
  document.getElementById('preview-name-label').textContent = 'Vorschau';
  document.getElementById('preview-fallback').textContent = '?';
  document.getElementById('preview-icon-wrap').innerHTML = '<span class="fallback-letter" id="preview-fallback">?</span>';

  const sel = document.getElementById('tile-section-select');
  if (sectionId) {
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === sectionId) { sel.selectedIndex = i; break; }
    }
  }
  document.getElementById('tile-modal').classList.add('open');
  setTimeout(() => document.getElementById('tile-name-input').focus(), 50);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function updatePreview() {
  const name = document.getElementById('tile-name-input').value;
  const url  = document.getElementById('tile-url-input').value;
  document.getElementById('preview-name-label').textContent = name || 'Vorschau';

  const wrap = document.getElementById('preview-icon-wrap');
  wrap.innerHTML = '';

  const faviconUrl = getFaviconUrl(url);
  if (faviconUrl && url.length > 3) {
    const img = document.createElement('img');
    img.src = faviconUrl;
    img.alt = name;
    img.onerror = () => {
      img.remove();
      const sp = document.createElement('span');
      sp.className = 'fallback-letter';
      sp.id = 'preview-fallback';
      sp.textContent = getInitial(name);
      wrap.appendChild(sp);
    };
    wrap.appendChild(img);
  } else {
    const sp = document.createElement('span');
    sp.className = 'fallback-letter';
    sp.id = 'preview-fallback';
    sp.textContent = getInitial(name);
    wrap.appendChild(sp);
  }
}

function addTile() {
  const name = document.getElementById('tile-name-input').value.trim();
  const url  = document.getElementById('tile-url-input').value.trim();
  const secId = document.getElementById('tile-section-select').value;

  if (!name || !url) { alert('Bitte Name und URL eingeben.'); return; }

  const sec = appData.sections.find(s => s.id === secId);
  if (!sec) return;

  sec.tiles.push({ id: 't' + Date.now(), name, url: normalizeUrl(url) });
  saveData();
  closeModal('tile-modal');
  render();
}

function deleteTile(secId, tileId) {
  const sec = appData.sections.find(s => s.id === secId);
  if (!sec) return;
  sec.tiles = sec.tiles.filter(t => t.id !== tileId);
  saveData();
  render();
}

// ── Section CRUD ──────────────────────────────────────────────────────
function openNewSectionModal() {
  document.getElementById('section-name-input').value = '';
  document.getElementById('section-modal').classList.add('open');
  setTimeout(() => document.getElementById('section-name-input').focus(), 50);
}

function addSection() {
  const name = document.getElementById('section-name-input').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  appData.sections.push({ id: 's' + Date.now(), name, tiles: [] });
  saveData();
  closeModal('section-modal');
  render();
}

function deleteSection(secId) {
  if (!confirm('Kategorie und alle Kacheln darin löschen?')) return;
  appData.sections = appData.sections.filter(s => s.id !== secId);
  saveData();
  render();
}

// ── Clock ─────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('time').textContent =
    now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('date').textContent =
    now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
}
updateClock();
setInterval(updateClock, 1000);

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', (e) => { if (e.target === el) el.classList.remove('open'); });
});

// ── PWA ───────────────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-bar').classList.add('visible');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt = null;
  document.getElementById('install-bar').classList.remove('visible');
});
document.getElementById('dismiss-btn').addEventListener('click', () => {
  document.getElementById('install-bar').classList.remove('visible');
});

if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='dashboard-v2';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/']))));
    self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

// ── Init ──────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
